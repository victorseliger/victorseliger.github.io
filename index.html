<!DOCTYPE html>
<html lang="pt-BR" data-lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Meta preenchido dinamicamente por content.js; defaults pra SEO/no-JS abaixo -->
  <title>Victor Seliger — Senior Implementation &amp; Solutions Engineer · AI-Native Delivery</title>
  <meta name="description" content="Página feita pra você ler em 3 minutos e sair sabendo se vale a conversa. 9 anos em mercado financeiro, IA aplicada em produção." />
  <meta name="author" content="Victor Seliger" />
  <link rel="canonical" href="https://victorseliger.github.io/" />

  <!-- Open Graph -->
  <meta property="og:type" content="profile" />
  <meta property="og:title" content="Victor Seliger — Senior Implementation &amp; Solutions Engineer" />
  <meta property="og:description" content="Página feita pra recrutador ler em 3 minutos e sair sabendo se vale a conversa." />
  <meta property="og:url" content="https://victorseliger.github.io/" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta name="twitter:card" content="summary" />

  <!-- Favicon (monograma VS) -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <!-- Estilos -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/components.css" />

  <!-- Schema.org Person -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Victor Seliger",
    "jobTitle": "Senior Implementation & Solutions Engineer",
    "address": { "@type": "PostalAddress", "addressLocality": "São Paulo", "addressCountry": "BR" },
    "url": "https://victorseliger.github.io/",
    "sameAs": ["https://www.linkedin.com/in/victor-seliger-208137b6/"],
    "knowsAbout": ["Applied AI", "Claude Code", "n8n", "SQL", "ETL", "BACEN", "Financial Reconciliation", "Data Engineering"],
    "knowsLanguage": ["pt-BR", "en", "es"]
  }
  </script>

  <!-- ============================================================
       ANALYTICS (Plausible) — INATIVO.
       Victor: descomente e troque data-domain quando criar a conta.
       <script defer data-domain="victorseliger.github.io"
               src="https://plausible.io/js/script.tagged-events.js"></script>
       ============================================================ -->
</head>

<body>
  <!-- ====================== SEÇÃO 0 — Topbar ====================== -->
  <header class="topbar">
    <div class="container topbar__inner">
      <div class="topbar__brand">
        <span class="monogram" aria-hidden="true">VS</span>
        <span class="topbar__name" data-bind="topbar.name">Victor Seliger</span>
      </div>

      <div class="topbar__actions">
        <div class="lang-toggle" role="group" data-bind-aria-label="topbar.lang_toggle_aria">
          <button class="lang-toggle__btn" data-lang-btn="pt" aria-pressed="true">PT</button>
          <button class="lang-toggle__btn" data-lang-btn="en" aria-pressed="false">EN</button>
        </div>

        <a class="cta cta--primary" data-cta="inmail" target="_blank" rel="noopener" href="#">
          <svg class="cta__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.61 0 4.28 2.38 4.28 5.47v6.27zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zM7.12 20.45H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.22.79 24 1.77 24h20.45c.98 0 1.78-.78 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z"/></svg>
          <span class="cta__label" data-bind="topbar.cta_primary">InMail</span>
        </a>
        <a class="cta cta--secondary" data-cta="whatsapp" target="_blank" rel="noopener" href="#">
          <svg class="cta__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M.06 24l1.69-6.16a11.87 11.87 0 0 1-1.59-5.95C.16 5.34 5.5 0 12.06 0a11.82 11.82 0 0 1 8.41 3.49 11.82 11.82 0 0 1 3.48 8.42c0 6.56-5.34 11.9-11.9 11.9a11.9 11.9 0 0 1-5.69-1.45L.06 24zM6.6 20.13c1.68.99 3.28 1.59 5.45 1.59 5.45 0 9.89-4.43 9.89-9.88a9.85 9.85 0 0 0-2.9-7 9.81 9.81 0 0 0-6.98-2.9c-5.46 0-9.9 4.43-9.9 9.88 0 2.28.67 3.98 1.79 5.76l-1 3.65 3.65-1.1zm11.4-5.46c-.07-.12-.27-.2-.57-.35-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.25-.46-2.39-1.47-.88-.79-1.48-1.76-1.65-2.06-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51l-.57-.01c-.2 0-.52.07-.8.37-.27.3-1.04 1.02-1.04 2.49 0 1.47 1.07 2.89 1.22 3.09.15.2 2.1 3.2 5.08 4.49.71.3 1.26.49 1.69.63.71.22 1.36.19 1.87.12.57-.09 1.76-.72 2.01-1.42.25-.7.25-1.29.17-1.42z"/></svg>
          <span class="cta__label" data-bind="topbar.cta_secondary">WhatsApp</span>
        </a>
      </div>
    </div>
  </header>

  <main>
    <!-- ====================== SEÇÃO 1 — Hero ====================== -->
    <section class="hero" aria-labelledby="hero-name">
      <div class="container">
        <h1 class="hero__promise reveal">
          <span class="line-1" data-bind="hero.promise_line1"></span>
          <span class="line-2" data-bind="hero.promise_line2"></span>
        </h1>
        <hr class="hero__rule reveal" data-delay="1" />
        <p class="hero__name reveal" data-delay="1" id="hero-name" data-bind="hero.name"></p>
        <p class="hero__role reveal" data-delay="2" data-bind="hero.role"></p>
        <p class="hero__availability reveal" data-delay="3">
          <span data-bind="hero.availability_line1"></span>
          <span data-bind="hero.availability_line2"></span>
        </p>
        <div class="hero__ctas reveal" data-delay="4">
          <a class="cta cta--primary" data-cta="inmail" target="_blank" rel="noopener" href="#" data-bind="hero.cta_primary_label"></a>
          <a class="cta cta--secondary" data-cta="whatsapp" target="_blank" rel="noopener" href="#" data-bind="hero.cta_secondary_label"></a>
        </div>
      </div>
      <div class="hero__scroll-cue" aria-hidden="true">
        <span>scroll</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </section>

    <!-- ====================== SEÇÃO 2 — Sobre mim ====================== -->
    <section class="section" aria-labelledby="about-title">
      <div class="container">
        <h2 class="section__header reveal" id="about-title" data-bind="about.section_title"></h2>
        <hr class="section__rule reveal" />
        <div class="about__grid reveal">
          <div>
            <img class="about__photo" src="assets/photo-victor.webp"
                 width="512" height="512" loading="lazy" decoding="async"
                 data-bind-alt="about.photo_alt" alt="Victor Seliger" />
          </div>
          <div>
            <p class="about__identity" data-bind="about.identity_line"></p>
            <p class="about__family" data-bind="about.family_line"></p>
            <div class="about__narrative">
              <p data-bind="about.narrative_p1"></p>
              <p data-bind="about.narrative_p2"></p>
              <p data-bind="about.narrative_p3"></p>
            </div>
            <div class="about__meta">
              <div class="about__meta-row">
                <span class="about__meta-label" data-bind="about.model_label"></span>
                <span class="about__meta-value" data-bind="about.model_value"></span>
              </div>
              <div class="about__meta-row">
                <span class="about__meta-label" data-bind="about.availability_label"></span>
                <span class="about__meta-value" data-bind="about.availability_value"></span>
              </div>
              <div class="about__meta-row">
                <span class="about__meta-label" data-bind="about.languages_label"></span>
                <span class="about__meta-value" data-bind="about.languages_value"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ====================== SEÇÃO 3 — Trajetória ====================== -->
    <section class="section" aria-labelledby="trajectory-title">
      <div class="container">
        <h2 class="section__header reveal" id="trajectory-title" data-bind="trajectory.section_title"></h2>
        <hr class="section__rule reveal" />
        <div class="accordion reveal" id="trajectory-list" data-accordion="trajectory"></div>
      </div>
    </section>

    <!-- ====================== SEÇÃO 4 — O que faço ====================== -->
    <section class="section section--subtle" aria-labelledby="what-title">
      <div class="container">
        <h2 class="section__header reveal" id="what-title" data-bind="what_i_do.section_title"></h2>
        <hr class="section__rule reveal" />
        <p class="what__headline reveal" data-bind="what_i_do.headline"></p>
        <div class="what__grid">
          <div class="what__block reveal">
            <p class="what__block-label" data-bind="what_i_do.expertise_label"></p>
            <p class="what__block-text" data-bind="what_i_do.expertise_text"></p>
          </div>
          <div class="what__block reveal" data-delay="1">
            <p class="what__block-label" data-bind="what_i_do.edge_label"></p>
            <p class="what__block-text" data-bind="what_i_do.edge_text"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- ====================== SEÇÃO 5 — Como me destaco com IA ====================== -->
    <section class="section section--dark" aria-labelledby="ai-title">
      <div class="container">
        <h2 class="section__header reveal" id="ai-title" data-bind="ai_section.section_title"></h2>
        <hr class="section__rule reveal" />
        <p class="ai__manifesto reveal" data-bind="ai_section.manifesto"></p>
        <ul class="ai-bullets reveal" id="ai-bullets"></ul>
        <p class="kpi-section-title reveal" data-bind="ai_section.kpi_section_title"></p>
        <div class="kpi-grid reveal" id="kpi-grid"></div>
        <div class="proof reveal">
          <p class="proof__label" data-bind="ai_section.proof_label"></p>
          <p class="proof__text" data-bind="ai_section.proof_text"></p>
        </div>
      </div>
    </section>

    <!-- ====================== SEÇÃO 6 — Stack técnica e soft skills ====================== -->
    <section class="section" aria-labelledby="stack-title">
      <div class="container">
        <h2 class="section__header reveal" id="stack-title" data-bind="stack_section.section_title"></h2>
        <hr class="section__rule reveal" />
        <div class="accordion reveal" id="stack-list" data-accordion="stack"></div>
      </div>
    </section>

    <!-- ====================== SEÇÃO 7 — Objetivo de carreira ====================== -->
    <section class="section section--subtle" aria-labelledby="objective-title">
      <div class="container">
        <h2 class="section__header reveal" id="objective-title" data-bind="career_objective.section_title"></h2>
        <hr class="section__rule reveal" />
        <p class="what__headline reveal" data-bind="career_objective.intro"></p>
        <div class="accordion reveal" id="objective-list" data-accordion="objective"></div>
      </div>
    </section>

    <!-- ====================== SEÇÃO 8 — Bloco final (CTA) ====================== -->
    <section class="final" aria-labelledby="final-p1">
      <div class="container">
        <p class="final__p1 reveal" id="final-p1" data-bind="final_cta.p1"></p>
        <p class="final__p2 reveal">
          <span data-bind="final_cta.p2_line1"></span>
          <span data-bind="final_cta.p2_line2"></span>
        </p>
        <p class="final__p3 reveal" data-bind="final_cta.p3"></p>
        <p class="final__next-label reveal" data-bind="final_cta.next_step_label"></p>
        <div class="final__ctas reveal">
          <div class="final__cta-row">
            <a class="cta cta--primary" data-cta="inmail" target="_blank" rel="noopener" href="#" data-bind="final_cta.primary_cta.label"></a>
            <span class="final__cta-sub" data-bind="final_cta.primary_cta.subtext"></span>
          </div>
          <div class="final__cta-row">
            <a class="cta cta--secondary" data-cta="whatsapp" target="_blank" rel="noopener" href="#" data-bind="final_cta.secondary_cta.label"></a>
            <span class="final__cta-sub" data-bind="final_cta.secondary_cta.subtext"></span>
          </div>
        </div>
        <p class="final__signature reveal" data-bind="final_cta.signature"></p>
      </div>
    </section>
  </main>

  <!-- ====================== Footer ====================== -->
  <footer class="footer">
    <div class="container">
      <p data-bind="footer.credits"></p>
      <p>
        <a data-cta="repo" target="_blank" rel="noopener" href="#" data-bind="footer.repo_link_label"></a>
        · <span data-bind="footer.site_url"></span>
      </p>
    </div>
  </footer>

  <!-- Scripts (vanilla, sem framework). defer mantém ordem e não bloqueia render. -->
  <script defer src="scripts/content.js"></script>
  <script defer src="scripts/analytics.js"></script>
  <script defer src="scripts/i18n.js"></script>
  <script defer src="scripts/accordion.js"></script>
  <script defer src="scripts/scroll.js"></script>
  <script defer src="scripts/main.js"></script>
</body>
</html>
